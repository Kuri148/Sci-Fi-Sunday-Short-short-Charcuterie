<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sci-Fi Sunday Short-Short Charcuterie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --wood-dark:#3a2410;
  --paper:#f3ead6;
  --paper-edge:#e2d3b0;
  --ink:#2e2113;
  --plum:#7a3fa0;
  --citron:#c8541f;       /* warm "rust" accent that pops on wood */
  --rust:#a8453d;
  --cream:#f6efe0;
  --ash:#6b5a42;
  --line:rgba(58,36,16,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    linear-gradient(rgba(40,24,10,.18),rgba(40,24,10,.30)),
    url("images/board_bg.jpg") center/cover fixed,
    var(--wood-dark);
  color:var(--cream);
  font-family:"Space Grotesk",system-ui,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:clamp(28px,5vw,64px) clamp(18px,4vw,48px)}

/* board grid */
.board{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(232px,1fr));
  gap:clamp(20px,3vw,44px);
  align-items:start;
}
.bite{
  position:relative;
  background:transparent;
  border:none;
  border-radius:0;
  cursor:pointer;
  transition:transform .35s cubic-bezier(.2,.7,.2,1);
}
.bite:focus-visible{outline:2px solid var(--citron);outline-offset:6px;border-radius:10px}
.bite:hover{transform:translateY(-6px)}
.bite.tasted{cursor:default}
.bite.tasted:hover{transform:none}
.bite .num{
  position:absolute;top:6px;left:10px;z-index:3;
  font-family:"Space Mono",monospace;font-size:.66rem;color:#ffd9a0;
  text-shadow:0 1px 6px rgba(20,10,2,.9);
}
/* food vector floats directly on the board */
.thumb{position:relative;aspect-ratio:1;display:grid;place-items:center;padding:10px}
.thumb img{
  width:82%;height:82%;object-fit:contain;display:block;
  filter:drop-shadow(0 10px 14px rgba(20,10,2,.5));
  transition:transform .5s cubic-bezier(.2,.7,.2,1);
}
.bite:hover .thumb img{transform:scale(1.06) rotate(3deg)}
.bite.eaten .thumb img{filter:drop-shadow(0 10px 14px rgba(20,10,2,.5)) grayscale(.4) opacity(.5)}
.thumb::after{content:none}

/* text floats under the food; name always visible, full note reveals on hover */
.taste{
  position:relative;z-index:2;
  padding:4px 10px 2px;text-align:center;
}
.taste .name{
  font-family:"Fraunces",serif;font-weight:700;font-size:1.18rem;line-height:1.15;color:#fbf3e2;
  text-shadow:0 2px 10px rgba(20,10,2,.95),0 0 2px rgba(20,10,2,.8);
}
.taste .len{
  font-family:"Space Mono",monospace;font-size:.64rem;color:#ffce9a;
  text-transform:uppercase;letter-spacing:.14em;margin-top:5px;
  text-shadow:0 1px 6px rgba(20,10,2,.95);
}
/* the note is collapsed until hover, then expands fully — no clipping */
.taste .notes{
  margin-top:0;color:#f0e3c8;font-size:.82rem;line-height:1.45;
  text-shadow:0 1px 6px rgba(20,10,2,.95);
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .4s ease, opacity .3s ease, margin-top .4s ease;
}
.bite:hover .taste .notes,.bite:focus-within .taste .notes{
  max-height:240px;opacity:1;margin-top:9px;
}
.taste .notes em{color:#fff3df;font-style:italic}

/* rating row floats too, no background */
.ratebar{
  position:relative;z-index:4;
  padding:8px 10px 4px;display:flex;align-items:center;justify-content:center;gap:9px;
}
.stars{display:flex;gap:3px}
.star{
  font-size:1.15rem;line-height:1;color:rgba(246,239,224,.4);
  cursor:pointer;transition:color .15s, transform .15s;
  text-shadow:0 1px 5px rgba(20,10,2,.9);
}
.star.lit{color:#f3b04a}
.star:hover{transform:scale(1.2)}
.rate-label{font-family:"Space Mono",monospace;font-size:.6rem;color:#e0cdaa;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 1px 5px rgba(20,10,2,.9)}

.empty{padding:60px 20px;text-align:center;color:#ecddc2;font-family:"Space Mono",monospace;font-size:.8rem;line-height:1.7;text-shadow:0 1px 8px rgba(20,10,2,.6)}
.empty b{color:#fbf3e2;font-weight:400}

footer{margin-top:64px;padding-top:24px;border-top:1px solid rgba(246,239,224,.22);font-family:"Space Mono",monospace;font-size:.66rem;color:#d8c6a6;letter-spacing:.06em;line-height:1.8;text-shadow:0 1px 6px rgba(20,10,2,.5)}

@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
  html{scroll-behavior:auto}
}
</style>
</head>
<body>
<div class="wrap">
  <main class="board" id="board">
    <div class="empty" id="loading">plating the board…</div>
  </main>
</div>

<script>
const RATE_KEY = "scifi_charcuterie_ratings_v1";
let ratings = {};
try { ratings = JSON.parse(localStorage.getItem(RATE_KEY) || "{}"); } catch(e){ ratings = {}; }
function saveRatings(){ try{ localStorage.setItem(RATE_KEY, JSON.stringify(ratings)); }catch(e){} }

/* "om-nom-nom" via WebAudio — three soft chewy thumps */
let actx;
function omNomNom(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const t0 = actx.currentTime;
    [0,0.16,0.32].forEach((dt,i)=>{
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(150 - i*18, t0+dt);
      o.frequency.exponentialRampToValueAtTime(70, t0+dt+0.13);
      g.gain.setValueAtTime(0.0001, t0+dt);
      g.gain.exponentialRampToValueAtTime(0.5, t0+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dt+0.15);
      o.connect(g).connect(actx.destination);
      o.start(t0+dt); o.stop(t0+dt+0.16);
    });
  }catch(e){}
}

function starRow(item){
  const wrap = document.createElement("div");
  wrap.className = "ratebar";
  const stars = document.createElement("div");
  stars.className = "stars";
  const current = ratings[item.name] || 0;
  for(let n=1;n<=5;n++){
    const s = document.createElement("span");
    s.className = "star" + (n<=current ? " lit":"");
    s.textContent = "★";
    s.setAttribute("role","button");
    s.setAttribute("tabindex","0");
    s.setAttribute("aria-label", n+" star"+(n>1?"s":""));
    const set = ()=>{ ratings[item.name]=n; saveRatings(); paint(); };
    s.addEventListener("click",e=>{e.stopPropagation();set();});
    s.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();set();}});
    s.addEventListener("mouseenter",()=>paint(n));
    s.addEventListener("mouseleave",()=>paint());
    stars.appendChild(s);
  }
  function paint(hover){
    [...stars.children].forEach((el,idx)=>{
      const lvl = hover!=null ? hover : (ratings[item.name]||0);
      el.classList.toggle("lit", idx+1<=lvl);
    });
  }
  const label = document.createElement("span");
  label.className = "rate-label";
  label.textContent = current ? "your bite" : "rate it";
  wrap.append(stars,label);
  return wrap;
}

function makeBite(item, idx){
  const tasted = !!ratings[item.name]; // once tasted (clicked), image is "uneaten" -> unclickable
  // Spec: clicking the *image* plays sound, makes image/entry unclickable, opens url.
  const card = document.createElement("article");
  card.className = "bite";
  card.tabIndex = 0;
  card.dataset.name = item.name;

  card.innerHTML = `
    <span class="num">${String(idx+1).padStart(2,"0")}</span>
    <div class="thumb"><img src="images/${item.image}" alt="cover art for ${item.name}" onerror="this.style.opacity=.25"></div>
    <div class="taste">
      <div class="name">${item.name}</div>
      <div class="len">${item.length}</div>
      <div class="notes">tastes like <em>${item.tastes_like}</em></div>
    </div>`;

  card.appendChild(starRow(item));

  let eaten = card.classList.contains("eaten");
  function bite(){
    if(card.classList.contains("eaten")) return;
    card.classList.add("eaten","tasted");
    omNomNom();
    if(item.url) window.open(item.url, "_blank", "noopener");
  }
  // clicking the image area triggers the bite; star clicks stopPropagation
  card.querySelector(".thumb").addEventListener("click", bite);
  card.querySelector(".taste").addEventListener("click", bite);
  card.addEventListener("keydown", e=>{
    if((e.key==="Enter"||e.key===" ") && !["star"].some(c=>e.target.classList.contains(c))){
      e.preventDefault(); bite();
    }
  });
  return card;
}

async function load(){
  const board = document.getElementById("board");
  try{
    const res = await fetch("shorts.xlsx");
    if(!res.ok) throw new Error("missing shorts.xlsx");
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type:"array"});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(sheet, {defval:""});
    board.innerHTML = "";
    if(!data.length){ board.innerHTML = `<div class="empty">The board is empty. Add rows to <b>shorts.xlsx</b> and reload.</div>`; return; }
    data.forEach((row,i)=> board.appendChild(makeBite(row,i)));
  }catch(err){
    board.innerHTML = `<div class="empty">Couldn't plate the board.<br><b>${err.message}</b><br><br>Run this through a local server (file:// blocks the spreadsheet fetch):<br><b>python3 -m http.server</b></div>`;
  }
}
load();
</script>
</body>
</html>
